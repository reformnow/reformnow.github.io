# Church History Timeline
# Comprehensive timeline from Pentecost to Modern Day
# Major ecumenical councils, synods, and doctrinal milestones
# Format:
# - date: "Year or Date" (Display)
#   year: 1517 (Numeric for sorting)
#   era: "apostolic|patristic|medieval|reformation|modern"
#   title: "Event Title"
#   title_zh: "中文标题"
#   description: "Brief description"
#   description_zh: "中文描述"
#   image: "/assets/img/timeline/event.jpg" (optional)
#   category: "theology|history|reformation|council|heresy"
#   link: "/posts/post-url/" (optional)

# --- Apostolic Age (33 - 100 AD) ---
- date: "33 AD"
  year: 33
  era: "apostolic"
  era_zh: "使徒时期"
  title: "Day of Pentecost"
  title_zh: "五旬节"
  description: "The Holy Spirit descends upon the apostles in Jerusalem, empowering them to preach the Gospel in multiple languages. This event marks the birth of the Christian Church and fulfills Jesus' promise to send the Advocate."
  description_zh: "圣灵在耶路撒冷降临在使徒身上，使他们能够用多种语言传讲福音。这一事件标志着基督教会的诞生，并应验了耶稣关于差遣保惠师的应许。"
  category: "history"
  image: "/assets/img/timeline/pentecost.jpg"

- date: "48-50 AD"
  year: 49
  era: "apostolic"
  era_zh: "使徒时期"
  title: "Council of Jerusalem"
  title_zh: "耶路撒冷会议"
  description: "First church council convenes to address whether Gentile converts must follow Mosaic law. Decides that salvation is by grace through faith, not circumcision."
  description_zh: "第一次教会会议召开，讨论外邦皈依者是否必须遵守摩西律法。会议裁定救恩是本乎恩、也因着信，而非靠割礼。"
  category: "council"
  image: "/assets/img/timeline/council-jerusalem.jpg"

# --- Patristic Era (100 - 500 AD) ---
- date: "c. 100-200 AD"
  year: 150
  era: "patristic"
  era_zh: "教父时期"
  title: "Rise of Gnosticism"
  title_zh: "诺斯底主义的兴起"
  description: "Dualistic heresy teaching that spirit is good but matter is evil. Denies Christ's true humanity. Refuted by Irenaeus and others."
  description_zh: "二元论异端，教导灵是善的，物质是恶的。否认基督真正的人性。遭到爱任纽等人的反驳。"
  category: "heresy"
  image: "/assets/img/timeline/gnosticism.jpg?v=2"

- date: "c. 144 AD"
  year: 144
  era: "patristic"
  era_zh: "教父时期"
  title: "Marcion's Heresy"
  title_zh: "马吉安异端"
  description: "Marcion rejects the Old Testament God and creates his own canon. His views prompt the church to establish the biblical canon."
  description_zh: "马吉安拒绝旧约的神，并创立了自己的正典。他的观点促使教会确立圣经正典。"
  category: "heresy"
  image: "/assets/img/timeline/marcion.jpg?v=2"

- date: "c. 156-172 AD"
  year: 160
  era: "patristic"
  era_zh: "教父时期"
  title: "Montanism (The New Prophecy)"
  title_zh: "梦他努主义（新预言运动）"
  description: "Started by Montanus in Phrygia, claiming direct new revelations from the Holy Spirit that superceded Apostolic authority. Characterized by extreme asceticism and ecstatic prophecy, it challenged the sufficiency of Scripture and the established order of the church."
  description_zh: "由梦他努在弗吕家发起，声称直接受圣灵的新启示，且这些启示超越了使徒的权威。该运动以极端苦修和狂喜式预言为特征，挑战了圣经的充足性以及教会的既有秩序。"
  category: "heresy"
  image: "/assets/img/timeline/montanism.jpg"

- date: "c. 180 AD"
  year: 180
  era: "patristic"
  era_zh: "教父时期"
  title: "Irenaeus: Against Heresies"
  title_zh: "爱任纽：《反异端》"
  description: "Irenaeus of Lyons writes 'Adversus Haereses,' defending the biblical faith against Gnosticism and establishing the 'Rule of Faith' and apostolic succession."
  description_zh: "里昂的爱任纽撰写《反异端》，捍卫圣经信仰对抗诺斯底主义，并确立了“信仰准则”和使徒继承。"
  category: "theology"
  image: "/assets/img/timeline/irenaeus.jpg?v=2"

- date: "313 AD"
  year: 313
  era: "patristic"
  era_zh: "教父时期"
  title: "Edict of Milan: Legalization of Christianity"
  title_zh: "米兰敕令：基督教合法化"
  description: "Emperors Constantine and Licinius issue the Edict of Milan, granting religious freedom throughout the Roman Empire and ending the era of state-sponsored persecution of Christians."
  description_zh: "君士坦丁与李锡尼共同颁布《米兰敕令》，承认基督教在罗马帝国的合法地位，停止了对基督徒的官方大逼迫，并归还了先前没收的教会财产。"
  category: "history"
  image: "/assets/img/timeline/edict-milan.jpg"

- date: "c. 318 AD"
  year: 318
  era: "patristic"
  era_zh: "教父时期"
  title: "Rise of Arianism"
  title_zh: "亚流派异端的兴起"
  description: "Arius, a presbyter in Alexandria, begins to teach that the Son of God was a created being and not eternal ('There was a time when he was not'). This denied Christ's full divinity and co-eternity with the Father, sparking the greatest theological crisis of the early church."
  description_zh: "亚历山大的长老亚流开始教导说，圣子是被造物，而非永恒的（“曾有一时祂不存在”）。这否认了基督完全的神性以及与父同等永恒的地位，引发了早期教会最严重的神学危机。"
  category: "heresy"
  image: "/assets/img/timeline/arianism.jpg"

- date: "325 AD"
  year: 325
  era: "patristic"
  era_zh: "教父时期"
  title: "First Council of Nicaea"
  title_zh: "第一次尼西亚公会议"
  description: "Convened by Constantine to address Arianism. Formulates the Nicene Creed affirming Christ's full divinity ('of one substance with the Father')."
  description_zh: "由君士坦丁召集以解决亚流派问题。制定了尼西亚信经，确认基督完全的神性（“与父同质”）。"
  category: "council"
  image: "/assets/img/timeline/council-nicaea.jpg?v=2"

- date: "380 AD"
  year: 380
  era: "patristic"
  era_zh: "教父时期"
  title: "Edict of Thessalonica: Christianity as State Religion"
  title_zh: "萨洛尼卡敕令：基督教成为国教"
  description: "Emperor Theodosius I issues the Edict of Thessalonica, declaring Nicene Christianity the sole official religion of the Roman Empire and effectively ending state support for paganism."
  description_zh: "皇帝狄奥多西一世颁布《萨洛尼卡敕令》，宣布尼西亚立场的基督教为罗马帝国唯一的官方宗教。这标志着基督教正式成为帝国国教，并终结了国家对异教运动的支持。"
  category: "history"
  image: "/assets/img/timeline/edict-thessalonica.jpg"

- date: "381 AD"
  year: 381
  era: "patristic"
  era_zh: "教父时期"
  title: "First Council of Constantinople"
  title_zh: "第一次君士坦丁堡公会议"
  description: "Confirms Nicene Creed, adds clauses on the Holy Spirit. Condemns Apollinarianism. Expands creed to full Trinitarian confession."
  description_zh: "确认尼西亚信经，增加了关于圣灵的条款。谴责了亚波里拿留主义。将信经扩展为完整的关于三位一体的宣认。"
  category: "council"
  image: "/assets/img/timeline/council-constantinople.jpg?v=2"

- date: "c. 385-410 AD"
  year: 405
  era: "patristic"
  era_zh: "教父时期"
  title: "Rise of Pelagianism"
  title_zh: "伯拉纠主义的兴起"
  description: "Pelagius, a British monk, teaches that human nature is essentially good and that Adam's sin affected only himself, not the human race. He argues that humans have the full capacity to live without sin and achieve salvation through free will and effort, denying the necessity of divine grace."
  description_zh: "英国修士伯拉纠教导说，人性本善，且亚当的罪只影响了他自己，而非全人类。他主张人类完全有能力靠着自由意志和努力不犯罪，以此获得救恩，从而否认了神圣恩典的必要性。这一学说是彻头彻尾的自救论异端。"
  category: "heresy"
  image: "/assets/img/timeline/pelagianism-rise.jpg"

- date: "c. 386-430 AD"
  year: 410
  era: "patristic"
  era_zh: "教父时期"
  title: "Augustine vs. Pelagius: The Great Controversy on Grace"
  title_zh: "奥古斯丁与伯拉纠：恩典之大争辩"
  description: "The most pivotal theological conflict of the early church. Augustine, Bishop of Hippo, defends the total necessity of God's sovereign grace against Pelagius. Augustine argues that following the Fall, the human will is 'not free' to choose God (Non Posse Non Peccare), necessitating a supernatural work of regeneration. This debate defined the doctrines of original sin, sola gratia, and predestination, laying the foundation for the later Reformation."
  description_zh: "早期教会最关键的神学冲突。希波的奥古斯丁致力于捍卫上帝主权恩典的绝对必要性，回击伯拉纠的自救论。奥古斯丁论证说，堕落之后人的意志处于“不能不犯罪”（Non Posse Non Peccare）的奴役状态，因此必须有圣灵超自然的重造之工。这场大争辩确立了原罪、唯独恩典和预定论等核心教义，为后来的宗教改革奠定了神学根基。"
  category: "theology"
  image: "/assets/img/timeline/augustine-pelagius.jpg"
  link: "/posts/augustine-vs-pelagius/"

- date: "410 AD"
  year: 410
  era: "patristic"
  era_zh: "教父时期"
  title: "Fall of Rome (Sack of Alaric)"
  title_zh: "罗马陷落（阿拉里克的掠夺）"
  description: "Visigoths sack Rome, causing theological crisis. Augustine responds with 'City of God,' distinguishing earthly and heavenly kingdoms."
  description_zh: "西哥特人洗劫罗马，引发神学危机。奥古斯丁以《上帝之城》作为回应，区分了地上之城和天上之城。"
  category: "history"
  image: "/assets/img/timeline/fall-of-rome.jpg?v=2"

- date: "418 AD"
  year: 418
  era: "patristic"
  era_zh: "教父时期"
  title: "Council of Carthage: The Definitive Condemnation of Pelagianism"
  title_zh: "迦太基会议：正式定罪伯拉纠主义"
  description: "A major local council that formally condemned Pelagius's views as heresy. It affirmed scriptural truth on three key points: 1) Adam's sin brought physical and spiritual death to his descendants; 2) Prevenient grace is necessary even for the first step toward God; 3) Only Christ's grace empowers the believer to obey God's commands."
  description_zh: "一次重要的地方主教会议，正式判定伯拉纠的观点为异端。会议确认了三项关键的圣经真理：1）亚当的罪使子孙陷入肉体与属灵的死亡；2）即使是向神迈出的第一步，先在恩典也是绝对必要的；3）唯独基督的恩典能加力量给信徒去遵守神的诫命。"
  category: "council"
  image: "/assets/img/timeline/pelagianism.jpg?v=2"

- date: "c. 426-429 AD"
  year: 427
  era: "patristic"
  era_zh: "教父时期"
  title: "John Cassian: Rise of Semi-Pelagianism"
  title_zh: "约翰·卡西安：半伯拉纠主义的兴起"
  description: "John Cassian promotes a 'middle ground' between Augustine and Pelagius, teaching that the human will is not entirely dead in sin and can take the 'first step' toward God. This view, later known as Semi-Pelagianism, makes salvation a cooperative effort (synergism) between God and man."
  description_zh: "约翰·卡西安在奥古斯丁和伯拉纠之间提出了“折中”立场，教导人的意志并未在罪中完全死绝，可以向神迈出“第一步”。这种观点后来被称为半伯拉纠主义，将救恩视为神与人之间的某种合作（神人合作说）。"
  category: "heresy"
  image: "/assets/img/timeline/john-cassian.jpg"

- date: "431 AD"
  year: 431
  era: "patristic"
  era_zh: "教父时期"
  title: "Council of Ephesus"
  title_zh: "以弗所公会议"
  description: "The third ecumenical council. It condemns Nestorianism, which separated Christ's divinity and humanity into two persons. The council affirms Mary as 'Theotokos' (God-bearer) to safeguard the unity of Christ's person. Crucially for Reformed theology, it also formally condemns Pelagianism on an ecumenical level, reinforcing the previous local rulings of Carthage."
  description_zh: "第三次大公会议。会议谴责了聂斯脱里主义（该异端将基督的神人二性分裂为两个位格），并确认马利亚为“诞神者”（Theotokos），以捍卫基督神人二性统一于一个位格。对归正神学至关重要的是，该会议在大公会议级别正式定罪了伯拉纠主义，进一步巩固了之前迦太基会议的地方性裁决。"
  category: "council"
  image: "/assets/img/timeline/council-ephesus.jpg?v=2"

- date: "451 AD"
  year: 451
  era: "patristic"
  era_zh: "教父时期"
  title: "Council of Chalcedon"
  title_zh: "迦克墩公会议"
  description: "The fourth ecumenical council. It produced the Chalcedonian Creed, which comprehensively defined Christ as one person (hypostasis) in two distinct natures (human and divine). These natures are united 'without confusion, without change, without division, without separation.' This definitive ruling refuted both Nestorianism (which divided the person) and Eutychianism (which confused the natures)."
  description_zh: "第四次大公会议。会议制定了《迦克墩信经》，确立了基督神人二性（人性与神性）联合于一个位格（Hypostasis）的教义。这两个本性在联合中具有“不相混乱，不相交换，不能分开，不能离散”的特性。这一定论同时反驳了分离基督位格的聂斯脱里主义，以及混淆基督本性的欧迪奇主义（一性论）。"
  category: "council"
  image: "/assets/img/timeline/council-chalcedon.jpg"

# --- Medieval Era (500 - 1500 AD) ---
- date: "529 AD"
  year: 529
  era: "medieval"
  era_zh: "中世纪时期"
  title: "Council of Orange"
  title_zh: "奥朗日会议"
  description: "Condemns Semi-Pelagianism. Affirms that the beginning of faith is itself a gift of God's grace."
  description_zh: "谴责半伯拉纠主义。确认信心的开端本身就是神恩典的恩赐。"
  category: "council"
  image: "/assets/img/timeline/council-orange.jpg?v=2"

- date: "1054 AD"
  year: 1054
  era: "medieval"
  era_zh: "中世纪时期"
  title: "Great Schism"
  title_zh: "相互绝罚（教会大分裂）"
  description: "Formal split between Eastern Orthodox and Roman Catholic churches over the Filioque clause and papal authority."
  description_zh: "由于“和子”条款和教皇权柄问题，东正教和罗马天主教正式分裂。"
  category: "history"
  image: "/assets/img/timeline/great-schism.jpg?v=2"

- date: "c. 1265-1274 AD"
  year: 1270
  era: "medieval"
  era_zh: "中世纪时期"
  title: "Thomas Aquinas: Summa Theologica"
  title_zh: "托马斯·阿奎那：《神学大全》"
  description: "Aquinas synthesizes Aristotelian philosophy with Christian theology, creating the most influential work of Scholasticism."
  description_zh: "阿奎那将亚里士多德哲学与基督教神学相结合，创作了经院哲学中最具影响力的著作。"
  category: "theology"
  image: "/assets/img/timeline/scholasticism.jpg?v=2"

- date: "c. 1380 AD"
  year: 1380
  era: "medieval"
  era_zh: "中世纪时期"
  title: "Wycliffe's Bible"
  title_zh: "威克里夫圣经"
  description: "John Wycliffe oversees the first complete translation of the Bible into Middle English, challenging the church's control over Scripture."
  description_zh: "约翰·威克里夫监督了第一部完整的中古英语圣经翻译，挑战了教会对圣经的控制。"
  category: "history"
  image: "/assets/img/timeline/wycliffe-hus.jpg"

# --- Reformation Era (1500 - 1650 AD) ---
- date: "1517"
  year: 1517
  era: "reformation"
  era_zh: "宗教改革时期"
  title: "95 Theses"
  title_zh: "九十五条论纲"
  description: "Martin Luther nails 95 theses to Wittenberg church door, protesting indulgences. Spark of the Protestant Reformation."
  description_zh: "马丁·路德将九十五条论纲钉在威登堡教堂门上，抗议赎罪券。开启了新教改革。"
  category: "reformation"
  image: "/assets/img/timeline/luther-95-theses.jpg?v=2"

- date: "1519"
  year: 1519
  era: "reformation"
  era_zh: "宗教改革时期"
  title: "Zwingli's Lectures in Zurich"
  title_zh: "慈运理在苏黎世的讲坛改革"
  description: "Huldrych Zwingli begins preaching through the New Testament verse-by-verse (Lectio Continua) at the Grossmünster in Zurich. This marks the beginning of the Swiss Reformation, characterized by a return to Scripture as the sole authority and the removal of statues and traditional rituals."
  description_zh: "胡德里希·慈运理在苏黎世大教堂开始逐节讲解新约圣经（连续讲经）。这标志着瑞士宗教改革的开始，其特点是回归圣经作为唯一权威，并移除了偶像雕像和传统仪式。"
  category: "reformation"
  image: "/assets/img/timeline/zwingli-zurich.jpg"

- date: "1521"
  year: 1521
  era: "reformation"
  era_zh: "宗教改革时期"
  title: "Diet of Worms"
  title_zh: "沃尔姆斯议会"
  description: "Martin Luther is summoned to appear before Holy Roman Emperor Charles V. When asked to recant his writings, Luther famously declares that his conscience is captive to the Word of God, stating: 'Here I stand; I can do no other.' The Emperor subsequently issues the Edict of Worms, declaring Luther an outlaw and heretic."
  description_zh: "马丁·路德受审于神圣罗马帝国皇帝查理五世面前。当被要求收回其著作时，路德发表了著名的宣言，声称其良心被上帝的话语所俘虏：“这是我的立场，我别无选择。”随后，皇帝签署《沃尔姆斯敕令》，宣布路德为不受法律保护的异端。"
  category: "reformation"
  image: "/assets/img/timeline/diet-of-worms.jpg?v=2"

- date: "1521-1522"
  year: 1521
  era: "reformation"
  era_zh: "宗教改革时期"
  title: "Luther at Wartburg Castle"
  title_zh: "路德在瓦尔特堡"
  description: "After the Diet of Worms, Luther is 'kidnapped' for his safety by Elector Frederick the Wise and hidden at Wartburg Castle. During this time, he translates the New Testament from Greek into German, making the Word of God accessible to the common people."
  description_zh: "在沃尔姆斯议会之后，路德被智者腓特烈“绑架”以确保安全，并隐居在瓦尔特堡。在此期间，他将新约圣经从希腊文翻译成德文，使上帝的话语能够被普通民众阅读。"
  category: "reformation"
  image: "/assets/img/timeline/wartburg.jpg"

- date: "1524-1525"
  year: 1525
  era: "reformation"
  era_zh: "宗教改革时期"
  title: "Luther vs. Erasmus: The Debate on Free Will"
  title_zh: "路德与伊拉斯谟：论自由意志的辩论"
  description: "Erasmus publishes 'On the Freedom of the Will' (1524), advocating for human cooperation in salvation. Luther responds with 'The Bondage of the Will' (1525), decisively arguing that the human will is enslaved to sin and entirely dependent on sovereign grace for salvation."
  description_zh: "伊拉斯谟出版《论自由意志》（1524），主张神人合作救恩。路德以《意志的束缚》（1525）回击，断言人的意志被罪奴役，救恩完全取决于上帝主权的恩典。"
  category: "theology"
  image: "/assets/img/timeline/luther-erasmus.jpg"
  link: "/posts/misunderstood-irresistible-grace/"

- date: "c. 1525"
  year: 1525
  era: "reformation"
  era_zh: "宗教改革时期"
  title: "Rise of Anabaptism (Radical Reformation)"
  title_zh: "重洗派（激进改革运动）的兴起"
  description: "The Radical Reformation begins in Zurich as Conrad Grebel and others break with Zwingli, rejecting infant baptism and insisting on 'believer's baptism.' By rejecting the church-state covenant and re-baptizing those previously baptized as infants, they were condemned as heretics by both Catholics and mainstream Reformers."
  description_zh: "苏黎世的康拉德·格列伯等人因为拒绝婴儿洗礼并坚持“信徒洗礼”而与慈运理决裂，开启了激进改革运动。他们全盘否定政教盟约并重新洗礼，因此被天主教和主流改教者一致判定为异端。"
  category: "heresy"
  image: "/assets/img/timeline/anabaptism.jpg"

- date: "1529"
  year: 1529
  era: "reformation"
  era_zh: "宗教改革时期"
  title: "Marburg Colloquy"
  title_zh: "马尔堡会谈"
  description: "A meeting between Martin Luther and Huldrych Zwingli to unite the German and Swiss Reformations. They agreed on 14 out of 15 articles but famously disagreed on the real presence of Christ in the Lord's Supper, leading to a permanent split between the Lutheran and Reformed traditions."
  description_zh: "马丁·路德与胡德里希·慈运理会面，试图统一德国和瑞士的改革运动。他们在15条条款中达成了14条共识，但在圣餐中基督是否真实临在的问题上产生了著名的分歧，导致了路德宗和归正宗传统之间的永久分裂。"
  category: "theology"
  image: "/assets/img/timeline/marburg-colloquy.jpg"

- date: "1536"
  year: 1536
  era: "reformation"
  era_zh: "宗教改革时期"
  title: "Institutes of the Christian Religion"
  title_zh: "《基督教要义》"
  description: "John Calvin publishes the first edition in Basel. Initially written as a defense of French Protestants (Huguenots) to King Francis I, it evolved through multiple editions (final in 1559) into the most influential systematic defense of Reformed theology, covering the knowledge of God the Creator, the Redeemer, the Holy Spirit, and the Church."
  description_zh: "约翰·加尔文在巴塞尔出版了第一版。该书最初是为向法国国王弗朗索瓦一世辩护遭逼迫的法国新教徒（胡格诺派）而写。经过多次修订（最终版于1559年完成），它发展成为归正神学中最具影响力的系统神学著作，涵盖了关于创造主上帝、救赎主、圣灵以及教会的全面知识。"
  category: "reformation"
  image: "/assets/img/timeline/calvin-institutes.jpg?v=2"

- date: "1545-1563"
  year: 1545
  era: "reformation"
  era_zh: "宗教改革时期"
  title: "Council of Trent"
  title_zh: "特伦托会议"
  description: "The primary response of the Roman Catholic Counter-Reformation. Defines Catholic dogma against Protestant 'heresies.'"
  description_zh: "罗马天主教反宗教改革的主要回应。定义了天主教教义对抗新教“异端”。"
  category: "council"
  image: "/assets/img/timeline/council-trent.jpg?v=2"

- date: "1560"
  year: 1560
  era: "reformation"
  era_zh: "宗教改革时期"
  title: "Scottish Reformation"
  title_zh: "苏格兰改革"
  description: "John Knox leads Scotland to break with Rome. The Scots Confession is adopted by Parliament."
  description_zh: "约翰·诺克斯领导苏格兰脱离罗马。议会通过了《苏格兰信经》。"
  category: "reformation"
  image: "/assets/img/timeline/scottish-reformation.jpg?v=2"

- date: "1563"
  year: 1563
  era: "reformation"
  era_zh: "宗教改革时期"
  title: "Heidelberg Catechism"
  title_zh: "海德堡要理问答"
  description: "A devotional and theological masterpiece of the Reformation, emphasizing the 'comfort' of belonging to Christ."
  description_zh: "宗教改革时期的一部灵修与神学杰作，强调属于基督的“安慰”。"
  category: "theology"
  image: "/assets/img/timeline/heidelberg-catechism.jpg?v=2"

- date: "1588"
  year: 1588
  era: "reformation"
  era_zh: "宗教改革时期"
  title: "Molinism (Middle Knowledge)"
  title_zh: "莫利纳主义（中间知识）"
  description: "Jesuit Luis de Molina publishes 'Concordia,' proposing 'Middle Knowledge' as a way to reconcile divine sovereignty with human free will. From a Reformed perspective, it is seen as a sophisticated form of Semi-Pelagianism that makes God's decrees dependent on human choices."
  description_zh: "耶稣会士路易斯·德·莫利纳出版《自由意志与恩典赐予的和谐》，提出“中间知识”的概念，试图调和上帝的主权与人的自由意志。从归正神学的视角看，这被视为一种复杂的“半伯拉纠主义”，因其将上帝的预旨建立在人的抉择之上。"
  category: "heresy"
  image: "/assets/img/timeline/molinism.jpg"

- date: "1603-1609"
  year: 1603
  era: "reformation"
  era_zh: "宗教改革时期"
  title: "Arminius at Leiden University"
  title_zh: "亚米念在莱顿大学"
  description: "Jacobus Arminius is appointed professor at Leiden, where he begins to challenge established Reformed views on predestination and grace, laying the seeds for later theological controversy."
  description_zh: "亚米念被任命为莱顿大学教授。在此期间，他开始对当时正统的归正预定论和恩典观提出挑战，埋下了日后神学争议的种子。"
  category: "heresy"
  image: "/assets/img/timeline/arminius.jpg"

- date: "1610"
  year: 1610
  era: "reformation"
  era_zh: "宗教改革时期"
  title: "The Remonstrance"
  title_zh: "五大抗辩信条"
  description: "Followers of Arminius issue the 'Five Articles of Remonstrance,' formally presenting their views on conditional election, universal atonement, and resistible grace."
  description_zh: "亚米念的追随者发布了《五大抗辩信条》，正式提出了他们在有条件拣选、普世赎罪和可抗拒恩典等方面的神学立场，直接引发了多特会议的召开。"
  category: "heresy"
  image: "/assets/img/timeline/remonstrance.jpg"
  link: "/posts/perseverance-of-the-saints/"

- date: "1618-1619"
  year: 1618
  era: "reformation"
  era_zh: "宗教改革时期"
  title: "Synod of Dort"
  title_zh: "多特会议"
  description: "Convened to settle the Arminian controversy. The Synod formally condemned Arminianism (Remonstrantism) as heresy and produced the Canons of Dort, defining the 'Five Points of Calvinism' (TULIP) in response."
  description_zh: "为解决亚米念派争议而召开。会议正式判定亚米念主义（抗辩派观点）为异端，并产生了《多特信经》（Canons of Dort），系统地阐述了“加尔文主义五要点”（TULIP）作为对异端的回应。"
  category: "council"
  image: "/assets/img/timeline/synod-dort.jpg"

- date: "1643-1647"
  year: 1643
  era: "reformation"
  era_zh: "宗教改革时期"
  title: "Westminster Assembly"
  title_zh: "威斯敏斯特会议"
  description: "Commissioned to reform the Church of England. Produces the Westminster Confession (WCF) and Catechisms."
  description_zh: "受命改革英格兰教会。制定了《威斯敏斯特信条》及其大小要理问答。"
  category: "council"
  image: "/assets/img/timeline/westminster-assembly.jpg"

# --- Modern Era (1650 - Present) ---
- date: "c. 1730-1750"
  year: 1740
  era: "modern"
  era_zh: "现代时期"
  title: "First Great Awakening"
  title_zh: "第一次大觉醒"
  description: "A profound spiritual revival across the American colonies and Britain, spearheaded by the theological depth of Jonathan Edwards and the powerful preaching of George Whitefield. It emphasized the absolute necessity of the 'new birth' (regeneration) and the sovereign grace of God in salvation. Viewed as a 'surprising work of God,' it prioritized the supernatural working of the Holy Spirit over human orchestration, laying a deep Reformed foundation for the Gospel in the West."
  description_zh: "一场席卷美洲殖民地和英国的深刻属灵复兴，其核心由乔纳森·爱德华兹的神学深度和乔治·怀特腓德的大能讲道所引领。该运动强调救赎中“新生命”（重生）的绝对必要性和上帝的主权恩典。它被视为“上帝奇妙的工作”，将圣灵超自然的运行置于人为策划之上，为福音在西方的发展奠定了深厚的归正神学基础。"
  category: "history"
  image: "/assets/img/timeline/great-awakening.jpg?v=2"

- date: "1792"
  year: 1792
  era: "modern"
  era_zh: "现代时期"
  title: "Modern Missionary Movement"
  title_zh: "现代差传运动"
  description: "William Carey publishes his 'Enquiry,' sparking the modern era of world missions starting in India."
  description_zh: "威廉·克里出版了他的《咨询》，开启了由印度开始的现代世界差传时代。"
  category: "history"
  image: "/assets/img/timeline/william-carey.jpg?v=2"

- date: "c. 1824-1835"
  year: 1830
  era: "modern"
  era_zh: "现代时期"
  title: "Charles Finney: The Rise of Decisionism"
  title_zh: "查尔斯·芬尼：决志主义的兴起"
  description: "Charles Grandison Finney introduces 'New Measures' in revival meetings, shifting the focus from God's sovereign miracle to human psychological techniques. Denying original sin (Pelagianism), he popularizes 'Decisionism'—the idea that salvation is the result of a human choice facilitated by emotional pressure."
  description_zh: "查尔斯·芬尼在复兴聚会中引入“新手段”，将重点从上帝的主权神迹转向人类的心理技术。他否认原罪（伯拉纠主义），并普及了“决志主义”——即认为救赎是由于人类在情感压力下做出的选择结果。"
  category: "heresy"
  image: "/assets/img/timeline/charles-finney.jpg"
  link: "/posts/past-and-present-of-decisionism/"

- date: "c. 1850-1900"
  year: 1870
  era: "modern"
  era_zh: "现代时期"
  title: "Princeton Theology"
  title_zh: "普林斯顿神学"
  description: "Charles Hodge and B.B. Warfield defend biblical inerrancy against rising theological liberalism."
  description_zh: "查尔斯·霍奇和B.B.沃菲尔德捍卫圣经无误论，对抗日益兴起的神学自由主义。"
  category: "theology"
  image: "/assets/img/timeline/princeton-theology.jpg?v=2"

- date: "1910-1915"
  year: 1910
  era: "modern"
  era_zh: "现代时期"
  title: "The Fundamentals"
  title_zh: "《基要真理》"
  description: "A landmark collection of 90 essays (12 volumes) authored by leading orthodox scholars (notably B.B. Warfield and J. Gresham Machen of Princeton) to systematically defend the historic Christian faith against Modernism and Higher Criticism. It articulated the 'Five Fundamentals'—including biblical inerrancy, the deity of Christ, the substitutionary atonement, and the physical resurrection—aiming to preserve the objective, supernatural character of the Gospel for the universal church."
  description_zh: "由当时最顶尖的正统学者（如普林斯顿神学院的 B.B. 沃菲尔德和梅钦）撰写的 12 卷、90 篇文章的巨著，旨在针对神学现代主义和高等批判学，对历史性的基督教信仰进行系统性的防御。该工程明确阐述了“五大基要点”（涵盖圣经无误、基督神性、代赎性受死及肉身复活），其核心目的是要为普世教会保全福音那客观、超自然的本质，抵挡将信仰彻底道德化、自然化的危险倾向。"
  category: "theology"
  image: "/assets/img/timeline/the-fundamentals.jpg?v=2"

- date: "1929"
  year: 1929
  era: "modern"
  era_zh: "现代时期"
  title: "Founding of Westminster Theological Seminary"
  title_zh: "威斯敏斯特神学院的建立"
  description: "J. Gresham Machen and other orthodox faculty members leave Princeton Theological Seminary to found Westminster. This marks a definitive stand to preserve the 'Old Princeton' Reformed tradition against the encroachment of theological liberalism."
  description_zh: "梅钦（J. Gresham Machen）及其他持守正统信仰的教授离开普林斯顿神学院，共同创立了威斯敏斯特神学院。这标志着归正神学家们为了抵御神学自由主义的渗透，坚决捍卫“老普林斯顿”改革宗传统的历史性立场。"
  category: "theology"
  image: "/assets/img/timeline/westminster-seminary.jpg"

- date: "c. 1990-Present"
  year: 2000
  era: "modern"
  era_zh: "现代时期"
  title: "New Calvinism"
  title_zh: "新加尔文主义"
  description: "A global resurgence of Reformed theology in the 21st century among younger generations."
  description_zh: "21世纪年轻一代中归正神学的全球复兴。"
  category: "theology"
  image: "/assets/img/timeline/new-calvinism.jpg?v=2"