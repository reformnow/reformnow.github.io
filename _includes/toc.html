{% include toc-status.html %}

{% if enable_toc %}
  <div class="toc-border-cover z-3"></div>
  <section id="toc-wrapper" class="invisible position-sticky ps-0 pe-4 pb-4">
    <h2 class="panel-heading ps-3 pb-2 mb-0">
      <span class="lang-en">{{- site.data.locales['en'].panel.toc | default: 'Contents' -}}</span>
      <span class="lang-zh">{{- site.data.locales['zh-CN'].panel.toc | default: '文章内容' -}}</span>
    </h2>
    <nav id="toc"></nav>
  </section>
{% endif %}
